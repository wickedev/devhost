name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false # stdlib-only module — no go.sum to key a cache on
      # The tap formula bump pushes to wickedev/homebrew-tap over SSH with
      # a repo-scoped deploy key (GITHUB_TOKEN can't reach another repo).
      # Without the secret we still release — just skip the formula.
      - name: Check tap deploy key
        id: flags
        env:
          TAP_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$TAP_KEY" ]; then
            echo "args=release --clean --skip=homebrew" >> "$GITHUB_OUTPUT"
            echo "::warning::TAP_DEPLOY_KEY not set — skipping tap formula update"
          else
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          fi
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: ${{ steps.flags.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
